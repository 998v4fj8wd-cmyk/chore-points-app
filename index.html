<!DOCTYPE html>
<html>
<head>
  <title>Family Chore App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    :root {
      --sage: #8FAF9A;
      --sage-dark: #6E8F7C;
      --bg: #F6F5F2;
      --card: #FFFFFF;
      --text: #1F2A24;
      --muted: #6B7C72;
      --accent: #A7B9AD;
      --danger: #C76D6D;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      background: var(--sage);
      color: white;
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      flex-wrap: wrap;
      background: #fff;
    }

    button {
      border: none;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      background: var(--sage);
      color: white;
    }

    button:hover {
      background: var(--sage-dark);
    }

    .card {
      background: var(--card);
      margin: 12px;
      padding: 14px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-family: inherit;
    }

    .big {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef3ef;
      font-size: 12px;
      color: var(--muted);
    }

    .danger {
      background: var(--danger);
      color: white;
    }

    .ghost {
      background: #e9efe9;
      color: var(--text);
    }

  </style>
</head>

<body>

<div class="header">🏡 Family Chore App</div>

<div class="tabs">
  <button onclick="setMode('kid')">Kid View</button>
  <button onclick="setMode('parent')">Parent View</button>
  <button onclick="setMode('echo')">Echo Screen</button>
</div>

<div class="card">
  <div class="big">Select Kid</div>
  <select id="kidSelect" onchange="render()"></select>
</div>

<div id="app"></div>

<script>
let mode = "kid";

let data = JSON.parse(localStorage.getItem("familyData")) || {
  kids: [
    { name: "Easton", points: 0 },
    { name: "Anderson", points: 0 },
    { name: "Emalynn", points: 0 }
  ],
  chores: [],
  rewards: []
};

function save() {
  localStorage.setItem("familyData", JSON.stringify(data));
}

function setMode(m) {
  mode = m;
  render();
}

function getKid() {
  return data.kids[document.getElementById("kidSelect").value];
}

function renderKidsDropdown() {
  let sel = document.getElementById("kidSelect");
  sel.innerHTML = "";
  data.kids.forEach((k,i)=>{
    sel.innerHTML += `<option value="${i}">${k.name}</option>`;
  });
}

/* ---------------- CHORES ---------------- */

function addChore() {
  let name = document.getElementById("choreName").value;
  let pts = parseInt(document.getElementById("chorePoints").value);
  let kid = document.getElementById("kidSelect").value;

  if(!name || !pts) return;

  data.chores.push({
    name,
    pts,
    kid,
    done:false,
    approved:false
  });

  save();
  render();
}

function completeChore(i) {
  data.chores[i].done = true;
  save();
  render();
}

function approveChore(i) {
  let c = data.chores[i];
  if(c.approved) return;

  c.approved = true;
  data.kids[c.kid].points += c.pts;

  save();
  render();
}

function deleteChore(i) {
  data.chores.splice(i,1);
  save();
  render();
}

/* ---------------- RENDER ---------------- */

function render() {
  renderKidsDropdown();

  let app = document.getElementById("app");
  let kid = getKid();

  let html = "";

  /* ECHO MODE */
  if(mode === "echo") {
    html += `<div class="card big">📊 Leaderboard</div>`;
    data.kids.forEach(k=>{
      html += `
        <div class="card row">
          <div><strong>${k.name}</strong></div>
          <div class="pill">${k.points} pts</div>
        </div>`;
    });
  }

  /* KID MODE */
  if(mode === "kid") {
    html += `<div class="card big">Hi, ${kid.name} 👋</div>`;
    html += `<div class="card">Current Points: <strong>${kid.points}</strong></div>`;

    html += `<div class="card"><h3>Your Chores</h3>`;

    data.chores
      .filter(c => c.kid == document.getElementById("kidSelect").value)
      .forEach((c,i)=>{
        html += `
          <div class="card">
            <div class="row">
              <div><strong>${c.name}</strong> <span class="pill">${c.pts} pts</span></div>
              ${c.done
                ? `<span class="pill">Done</span>`
                : `<button onclick="completeChore(${i})">Complete</button>`
              }
            </div>
          </div>
        `;
      });

    html += `</div>`;
  }

  /* PARENT MODE */
  if(mode === "parent") {

    html += `<div class="card big">Parent Dashboard</div>`;

    html += `
      <div class="card">
        <h3>Add Chore</h3>
        <input id="choreName" placeholder="Chore name">
        <input id="chorePoints" type="number" placeholder="Points value">
        <button onclick="addChore()">Add Chore</button>
      </div>
    `;

    html += `<div class="card"><h3>Pending Approval</h3>`;

    data.chores.forEach((c,i)=>{
      if(c.done && !c.approved){
        html += `
          <div class="card row">
            <div>${c.name} <span class="pill">${c.pts} pts</span></div>
            <button onclick="approveChore(${i})">Approve</button>
            <button class="danger" onclick="deleteChore(${i})">Delete</button>
          </div>
        `;
      }
    });

    html += `</div>`;

    html += `<div class="card"><h3>All Chores</h3>`;

    data.chores.forEach((c,i)=>{
      html += `
        <div class="card row">
          <div>${c.name} (${c.pts})</div>
          <button class="danger" onclick="deleteChore(${i})">Delete</button>
        </div>
      `;
    });

    html += `</div>`;
  }

  app.innerHTML = html;
}

render();
</script>

</body>
</html>
